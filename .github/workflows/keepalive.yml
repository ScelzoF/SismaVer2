name: Keep-Alive Ping

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping SismaVer2 Streamlit App
        run: |
          echo "Pinging sos-italia.streamlit.app..."
          curl -s -o /dev/null -w "Status: %{http_code}" --max-time 30 https://sos-italia.streamlit.app || true

      - name: Ping Supabase SismaVer2
        run: |
          echo "Pinging Supabase SismaVer2..."
          curl -s -o /dev/null -w "Status: %{http_code}" --max-time 10 \
            "https://ycdwgehifbyxarrsofmz.supabase.co/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" || true
